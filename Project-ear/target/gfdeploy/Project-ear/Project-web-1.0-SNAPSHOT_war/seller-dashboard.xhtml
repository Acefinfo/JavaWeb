<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Seller Dashboard</title>
        <style>
            body { font-family: Arial, Helvetica, sans-serif; margin: 0; background:#f4f6f8; }
            .top-bar {
                display: flex; justify-content: space-between; align-items: center;
                padding: 15px 30px; background: #2c3e50; color: #fff;
            }
            .top-bar h2 { margin: 0; font-size: 20px; }
            .top-bar .nav-actions { display:flex; gap:10px; align-items:center; }
            .content { max-width: 1100px; margin: 25px auto; padding: 0 20px; }
            .toolbar { margin-bottom: 15px; }
            .product-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 4px; }
            .welcome-text { color: #555; margin-bottom: 15px; }
            .unread-badge { background:#dc2626; color:#fff; border-radius: 10px; padding: 1px 8px; font-size: 12px; margin-left:6px; }
            .stat-cards { display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
            .stat-card { background:#fff; border-radius:10px; padding:16px 22px; box-shadow:0 2px 8px rgba(0,0,0,0.08); min-width:180px; }
            .stat-card .label { color:#777; font-size:13px; }
            .stat-card .value { font-size:24px; font-weight:700; color:#2563eb; }
            .chart-box { background:#fff; border-radius:10px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:20px; }
        </style>
    </h:head>

    <h:body>
        <div class="top-bar">
            <h2>Seller Dashboard</h2>
            <div class="nav-actions">
                <h:form>
                    <p:button value="Home" icon="pi pi-home" outcome="home" style="margin-right:8px;"/>
                    <p:commandButton value="Logout" action="#{userBean.logout}" ajax="false"
                                      icon="pi pi-sign-out" styleClass="ui-button-danger"/>
                </h:form>
            </div>
        </div>

        <div class="content">

            <p class="welcome-text">Welcome back <strong>#{sessionScope.currentUser.username}</strong></p>

            <p:tabView id="dashboardTabs">

                <p:tab title="My Products">
                    <h:form id="productForm">

                        <p:growl id="messages" showDetail="true"/>
                        
                        <div class="toolbar">
                            <p:commandButton value="Add New Product" icon="pi pi-plus"
                                              actionListener="#{productBean.openNew}"
                                              update=":productDialogForm"
                                              oncomplete="PF('productDialog').show()"/>
                            <p:commandButton value="Download All Products (Excel)" icon="pi pi-file-excel" ajax="false"
                                              actionListener="#{productBean.downloadProductsExcel}" style="margin-left:8px;"/>
                        </div>

                        <p:dataTable var="product" value="#{productBean.productList}" id="productTable"
                                     emptyMessage="You haven't added any product yet." paginator="true" rows="5">

                            <p:column headerText="Image" style="width:90px;">
                                <h:panelGroup rendered="#{not empty product.imageBase64}">
                                    <img src="data:image/jpeg;base64,#{product.imageBase64}" class="product-thumb" alt="#{product.name}"/>
                                </h:panelGroup>
                                <h:outputText value="No image" rendered="#{empty product.imageBase64}" style="color:#999; font-size:12px;"/>
                            </p:column>

                            <p:column headerText="Name">
                                <h:outputText value="#{product.name}"/>
                            </p:column>

                            <p:column headerText="Description">
                                <h:outputText value="#{product.description}"/>
                            </p:column>

                            <p:column headerText="Price">
                                <h:outputText value="#{product.price}">
                                    <f:convertNumber type="currency" currencySymbol="Rs"/>
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Stock">
                                <h:outputText value="#{product.stock}"/>
                            </p:column>
                            
                            <p:column headerText="Actions" style="width:150px; text-align:center;">
                                <p:commandButton icon="pi pi-pencil" styleClass="ui-button-info rounded-button"
                                                  title="Edit"
                                                  actionListener="#{productBean.editProduct(product)}"
                                                  update=":productDialogForm"
                                                  oncomplete="PF('productDialog').show()"/>

                                <p:commandButton icon="pi pi-image" ajax="false" title="Download Image"
                                                  styleClass="ui-button-secondary rounded-button"
                                                  actionListener="#{productBean.downloadProductImage(product)}"/>

                                <p:commandButton icon="pi pi-trash" styleClass="ui-button-danger rounded-button"
                                                  title="Delete"
                                                  actionListener="#{productBean.deleteProduct(product)}"
                                                  update=":dashboardTabs:productForm:productTable :dashboardTabs:productForm:messages">
                                    <p:confirm header="Confirm Delete" message="Delete this product?" icon="pi pi-exclamation-triangle"/>
                                </p:commandButton>
                            </p:column>

                        </p:dataTable>
                    </h:form>
                </p:tab>

                <p:tab title="My Sales">
                    <h:form id="salesForm">
                        <div class="toolbar" style="text-align:right; margin-bottom:10px;">
                            <p:commandButton value="Download Sales (Excel)" icon="pi pi-file-excel" ajax="false"
                                              actionListener="#{invoiceBean.downloadSellerInvoicesExcel}"/>
                        </div>
                        <p:dataTable var="inv" value="#{invoiceBean.sellerInvoices}"
                                     emptyMessage="No sales yet." paginator="true" rows="8">
                            <p:column headerText="Date">
                                <h:outputText value="#{inv.orderDate}">
                                    <f:convertDateTime pattern="dd MMM yyyy, HH:mm"/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Product">
                                <h:outputText value="#{inv.productName}"/>
                            </p:column>
                            <p:column headerText="Unit Price">
                                <h:outputText value="#{inv.unitPrice}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Qty Sold">
                                <h:outputText value="#{inv.quantity}"/>
                            </p:column>
                            <p:column headerText="Total">
                                <h:outputText value="#{inv.totalPrice}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </p:column>
                        </p:dataTable>
                    </h:form>
                </p:tab>

                <p:tab title="Revenue">
                    <div class="stat-cards">
                        <div class="stat-card">
                            <div class="label">Total Revenue</div>
                            <div class="value">
                                <h:outputText value="#{invoiceBean.sellerTotalRevenue}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Invoices</div>
                            <div class="value">#{invoiceBean.sellerInvoiceCount}</div>
                        </div>
                    </div>

                    <div class="chart-box">
                        <p:chart type="bar" model="#{invoiceBean.revenueByProductModel}" style="height:300px"/>
                    </div>

                    <div class="chart-box">
                        <p:chart type="line" model="#{invoiceBean.revenueOverTimeModel}" style="height:300px"/>
                    </div>
                </p:tab>

                <p:tab>
                    <f:facet name="title">
                        Inbox
                        <h:outputText value="#{inboxBean.unreadCount}" styleClass="unread-badge" rendered="#{inboxBean.unreadCount gt 0}"/>
                    </f:facet>
                    <h:form id="inboxForm">
                        <p:commandButton value="Mark all as read" icon="pi pi-check" actionListener="#{inboxBean.markAllRead}" update="@form" style="margin-bottom:10px;"/>
                        <p:dataTable var="msg" value="#{inboxBean.messages}" emptyMessage="No messages from the admin yet.">
                            <p:column headerText="Date" style="width:170px;">
                                <h:outputText value="#{msg.sentDate}">
                                    <f:convertDateTime pattern="dd MMM yyyy, HH:mm"/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Message">
                                <h:outputText value="#{msg.message}" style="font-weight:#{msg.read ? 'normal' : 'bold'};"/>
                            </p:column>
                            <p:column headerText="" style="width:120px;">
                                <p:commandButton value="Mark read" rendered="#{not msg.read}"
                                                  actionListener="#{inboxBean.markRead(msg)}" update="@form"/>
                            </p:column>
                        </p:dataTable>
                    </h:form>
                </p:tab>

            </p:tabView>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check"/>
                <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times"/>
            </p:confirmDialog>

            <p:dialog header="Product Details" widgetVar="productDialog" modal="true"
                      showEffect="fade" hideEffect="fade" width="420" responsive="true">
                <h:form id="productDialogForm" enctype="multipart/form-data">
                    <p:growl id="dialogMessages" showDetail="true"/>

                    <h:panelGrid columns="2" cellpadding="8">

                        <p:outputLabel for="name" value="Name:"/>
                        <p:inputText id="name" value="#{productBean.product.name}"
                                     required="true" requiredMessage="Name is required."/>

                        <p:outputLabel for="description" value="Description:"/>
                        <p:inputTextarea id="description" value="#{productBean.product.description}"
                                          rows="3" autoResize="false"/>

                        <p:outputLabel for="price" value="Price:"/>
                        <p:inputNumber id="price" value="#{productBean.product.price}"
                                        symbol="Rs " required="true" requiredMessage="Price is required."/>

                        <p:outputLabel for="stock" value="Stock:"/>
                        <p:inputNumber id="stock" value="#{productBean.product.stock}"
                                        decimalPlaces="0" required="true" requiredMessage="Stock quantity is required."/>

                        <p:outputLabel value="Image:"/>
                        <p:fileUpload value="#{productBean.uploadedFile}" mode="simple" skinSimple="true"/>

                    </h:panelGrid>

                    <div style="margin-top: 15px; text-align: right;">
                        <p:commandButton value="Save" icon="pi pi-check" ajax="false"
                                          actionListener="#{productBean.saveProduct}"/>
                        <p:commandButton value="Cancel" icon="pi pi-times" type="button"
                                          onclick="PF('productDialog').hide()" styleClass="ui-button-secondary"/>
                    </div>
                </h:form>
            </p:dialog>
        </div>
    </h:body>
</html>
