<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Customer Dashboard</title>
        <style>
            body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f4f6f8; }
            .top-bar { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#2c3e50; color:#fff; }
            .top-bar .nav-actions { display:flex; gap:10px; align-items:center; }
            .content { max-width: 1100px; margin: 25px auto; padding: 0 20px; }
            .welcome-text { color: #555; margin-bottom: 15px; }
            .product-thumb { width: 55px; height: 55px; object-fit: cover; border-radius: 4px; }
            .unread-badge { background:#dc2626; color:#fff; border-radius: 10px; padding: 1px 8px; font-size: 12px; margin-left:6px; }
            .cart-total { text-align:right; font-size: 18px; font-weight:700; margin-top: 10px; color:#2563eb; }
        </style>
    </h:head>

    <h:body>
        <div class="top-bar">
            <h2>Customer Dashboard</h2>
            <div class="nav-actions">
                <h:form>
                    <p:button value="Home" icon="pi pi-home" outcome="home" style="margin-right:8px;"/>
                    <p:commandButton value="Logout" action="#{userBean.logout}" ajax="false"
                                      icon="pi pi-sign-out" styleClass="ui-button-danger"/>
                </h:form>
            </div>
        </div>

        <div class="content">
            <p class="welcome-text">Welcome back <strong>#{sessionScope.currentUser.username}</strong></p>

            <p:tabView id="dashboardTabs">

                <p:tab title="My Cart">
                    <h:form id="cartForm">
                        <p:growl id="cartMessages" showDetail="true"/>

                        <p:dataTable var="item" value="#{cartBean.cartItems}" id="cartTable"
                                     emptyMessage="Your cart is empty.">
                            <p:column headerText="Image" style="width:80px;">
                                <h:panelGroup rendered="#{not empty item.product.imageBase64}">
                                    <img src="data:image/jpeg;base64,#{item.product.imageBase64}" class="product-thumb" alt="#{item.product.name}"/>
                                </h:panelGroup>
                                <h:outputText value="No image" rendered="#{empty item.product.imageBase64}" style="color:#999; font-size:12px;"/>
                            </p:column>
                            <p:column headerText="Product">
                                <h:outputText value="#{item.product.name}"/>
                            </p:column>
                            <p:column headerText="Unit Price">
                                <h:outputText value="#{item.product.price}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Quantity" style="width:140px; text-align:center;">
                                <p:commandButton icon="pi pi-minus" styleClass="ui-button-secondary rounded-button"
                                                  actionListener="#{cartBean.decrement(item)}" update="@form"/>
                                <h:outputText value="#{item.quantity}" style="margin:0 10px;"/>
                                <p:commandButton icon="pi pi-plus" styleClass="ui-button-secondary rounded-button"
                                                  actionListener="#{cartBean.increment(item)}" update="@form"/>
                            </p:column>
                            <p:column headerText="Line Total">
                                <h:outputText value="#{item.lineTotal}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Actions" style="width:100px; text-align:center;">
                                <p:commandButton icon="pi pi-trash" styleClass="ui-button-danger rounded-button"
                                                  actionListener="#{cartBean.remove(item)}" update="@form"/>
                            </p:column>
                        </p:dataTable>

                        <h:panelGroup rendered="#{cartBean.cartCount gt 0}">
                            <div class="cart-total">
                                Total:
                                <h:outputText value="#{cartBean.cartTotal}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </div>
                            <div style="text-align:right; margin-top:10px;">
                                <p:commandButton value="Checkout with eSewa" icon="pi pi-shopping-bag"
                                                 actionListener="#{paymentBean.payCartWithEsewa}"
                                                 update="@form :dashboardTabs:invoiceForm"/>
                            </div>
                        </h:panelGroup>
                    </h:form>
                </p:tab>

                <p:tab title="My Wishlist">
                    <h:form id="wishlistForm">
                        <p:growl id="wishlistMessages" showDetail="true"/>

                        <p:dataTable var="item" value="#{wishlistBean.wishlistItems}" id="wishlistTable"
                                     emptyMessage="Your wishlist is empty.">
                            <p:column headerText="Image" style="width:80px;">
                                <h:panelGroup rendered="#{not empty item.product.imageBase64}">
                                    <img src="data:image/jpeg;base64,#{item.product.imageBase64}" class="product-thumb" alt="#{item.product.name}"/>
                                </h:panelGroup>
                                <h:outputText value="No image" rendered="#{empty item.product.imageBase64}" style="color:#999; font-size:12px;"/>
                            </p:column>
                            <p:column headerText="Product">
                                <h:outputText value="#{item.product.name}"/>
                            </p:column>
                            <p:column headerText="Price">
                                <h:outputText value="#{item.product.price}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Actions" style="width:220px; text-align:center;">
                                <p:commandButton value="Move to Cart" icon="pi pi-shopping-cart"
                                                  actionListener="#{wishlistBean.moveToCart(item)}" update="@form :dashboardTabs:cartForm"/>
                                <p:commandButton icon="pi pi-trash" styleClass="ui-button-danger rounded-button"
                                                  actionListener="#{wishlistBean.remove(item)}" update="@form"/>
                            </p:column>
                        </p:dataTable>
                    </h:form>
                </p:tab>

                <p:tab title="My Invoices">
                    <h:form id="invoiceForm">
                        <p:dataTable var="inv" value="#{invoiceBean.customerInvoices}"
                                     emptyMessage="You haven't purchased anything yet.">
                            <p:column headerText="Date">
                                <h:outputText value="#{inv.orderDate}">
                                    <f:convertDateTime pattern="dd MMM yyyy, HH:mm"/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Product">
                                <h:outputText value="#{inv.productName}"/>
                            </p:column>
                            <p:column headerText="Seller">
                                <h:outputText value="#{inv.sellerUsername}"/>
                            </p:column>
                            <p:column headerText="Unit Price">
                                <h:outputText value="#{inv.unitPrice}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Qty">
                                <h:outputText value="#{inv.quantity}"/>
                            </p:column>
                            <p:column headerText="Total">
                                <h:outputText value="#{inv.totalPrice}">
                                    <f:convertNumber type="currency" currencySymbol="Rs "/>
                                </h:outputText>
                            </p:column>
                        </p:dataTable>
                    </h:form>
                </p:tab>

                <p:tab>
                    <f:facet name="title">
                        Inbox
                        <h:outputText value="#{inboxBean.unreadCount}" styleClass="unread-badge" rendered="#{inboxBean.unreadCount gt 0}"/>
                    </f:facet>
                    <h:form id="inboxForm">
                        <p:commandButton value="Mark all as read" icon="pi pi-check" actionListener="#{inboxBean.markAllRead}" update="@form" style="margin-bottom:10px;"/>
                        <p:dataTable var="msg" value="#{inboxBean.messages}" emptyMessage="No messages from the admin yet.">
                            <p:column headerText="Date" style="width:170px;">
                                <h:outputText value="#{msg.sentDate}">
                                    <f:convertDateTime pattern="dd MMM yyyy, HH:mm"/>
                                </h:outputText>
                            </p:column>
                            <p:column headerText="Message">
                                <h:outputText value="#{msg.message}" style="font-weight:#{msg.read ? 'normal' : 'bold'};"/>
                            </p:column>
                            <p:column headerText="" style="width:120px;">
                                <p:commandButton value="Mark read" rendered="#{not msg.read}"
                                                  actionListener="#{inboxBean.markRead(msg)}" update="@form"/>
                            </p:column>
                        </p:dataTable>
                    </h:form>
                </p:tab>

            </p:tabView>
        </div>
    </h:body>
</html>
