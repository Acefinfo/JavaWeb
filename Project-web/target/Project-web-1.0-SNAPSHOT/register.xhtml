<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    
     <h:head>
    <title>User Registration</title>

    <style>
        .container {
            display: flex; justify-content: center;align-items: center;height: 90vh;
        }
    </style>
</h:head>

    <h:body>

    <div class="container">

        <h:form id="registrationForm">
            <p:growl id="messages" showDetail="true" />
            <p:panel header="User Registration" style="width:420px">

                <h:panelGrid columns="2" cellpadding="8">
                    
                    <p:outputLabel for="username" value="Username:"/>
                    <p:inputText id="username" value="#{userBean.user.username}" required="true" requiredMessage="Username is required."/>

                    <p:outputLabel for="email" value="Email Address:"/>
                    <p:inputText id="email"  value="#{userBean.user.email}" required="true" requiredMessage="Email is required."/>

                    <p:outputLabel for="password" value="Password:"/>
                    <p:password id="password" value="#{userBean.user.password}" required="true" requiredMessage="Password is required."/>

                </h:panelGrid>

                <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">

                    <p:commandButton value="Register" action="#{userBean.register}" update="registrationForm messages" icon="pi pi-user-plus"/>

                    <p:link outcome="login" value="Back to Login"/>

                </div>

            </p:panel>

        </h:form>

    </div>

</h:body>

</html>
