<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>User Registration</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #ffffff;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Registration Card */
        .ui-panel {
            width: 450px !important;
            border: 1px solid #e5e5e5 !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .ui-panel-titlebar {
            background: #ffffff !important;
            border: none !important;
            border-bottom: 1px solid #ececec !important;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #333;
            padding: 18px;
        }

        .ui-panel-content {
            background: white;
            padding: 25px !important;
        }

        .ui-panelgrid td {
            padding: 10px 6px !important;
        }

        label {
            color: #555;
            font-weight: 500;
        }

        .ui-inputfield {
            width: 100%;
            border-radius: 6px;
        }

        .ui-selectonemenu {
            width: 100% !important;
        }

        .ui-button {
            background: #2563eb !important;
            border: none !important;
            border-radius: 6px !important;
            color: white !important;
            padding: 8px 18px;
            transition: 0.2s;
        }

        .ui-button:hover {
            background: #1d4ed8 !important;
        }

        .login-link {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
    </style>

</h:head>

<h:body>

    <div class="container">

        <h:form id="registrationForm">

            <p:growl id="messages" showDetail="true"/>

            <p:panel header="User Registration">

                <h:panelGrid columns="2" cellpadding="8">

                    <p:outputLabel for="username" value="Username"/>
                    <p:inputText id="username"
                                 value="#{userBean.user.username}"
                                 required="true"
                                 requiredMessage="Username is required."/>

                    <p:outputLabel for="email" value="Email"/>
                    <p:inputText id="email"
                                 value="#{userBean.user.email}"
                                 required="true"
                                 requiredMessage="Email is required."/>

                    <p:outputLabel for="password" value="Password"/>
                    <p:password id="password"
                                value="#{userBean.user.password}"
                                required="true"
                                requiredMessage="Password is required."/>

                    <p:outputLabel for="role" value="Account Type"/>
                    <p:selectOneMenu id="role"
                                     value="#{userBean.user.role}"
                                     required="true"
                                     requiredMessage="Please select an account type.">

                        <f:selectItem itemLabel="-- Select Account Type --"
                                      itemValue=""
                                      noSelectionOption="true"/>

                        <f:selectItem itemLabel="Seller" itemValue="Seller"/>
                        <f:selectItem itemLabel="Customer" itemValue="Customer"/>

                    </p:selectOneMenu>

                </h:panelGrid>

                <div class="button-row">

                    <p:commandButton value="Register"
                                     icon="pi pi-user-plus"
                                     action="#{userBean.register}"
                                     update="registrationForm messages"/>

                    <p:link outcome="login"
                            value="Back to Login"
                            styleClass="login-link"/>

                </div>

            </p:panel>

        </h:form>

    </div>

</h:body>

</html>
