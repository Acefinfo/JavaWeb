<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:head>
        <title>ShopShip - Home</title>
        <style>
            body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f4f6f8; }
            .top-bar {
                display: flex; justify-content: space-between; align-items: center;
                padding: 15px 30px; background: #2c3e50; color: #fff;
            }
            .top-bar h2 { margin: 0; font-size: 22px; }
            .search-row { display: flex; gap: 10px; align-items: center; }
            .search-row .ui-inputfield { border-radius: 20px !important; width: 320px; }
            .login-btn .ui-button { background: #2563eb !important; border-radius: 20px !important; border:none !important; }
            .content { max-width: 1200px; margin: 25px auto; padding: 0 20px; }
            .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
            .product-card {
                background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                text-align: center; transition: transform .15s ease;
            }
            .product-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
            .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; background:#eee; }
            .no-image-box {
                width: 100%; height: 160px; border-radius: 6px; background:#eee; color:#999;
                display:flex; align-items:center; justify-content:center; font-size: 13px;
            }
            .product-name { font-weight: 600; margin: 10px 0 4px; color:#222; }
            .product-price { color: #2563eb; font-weight: 700; margin-bottom: 10px; }
            .empty-msg { text-align:center; color:#777; margin-top: 60px; }
        </style>
    </h:head>

    <h:body>
        <div class="top-bar">
            <h2>Shop Shop</h2>

            <h:form id="searchForm" class="search-row">
                <p:inputText value="#{productBean.searchKeyword}" placeholder="Search products..."/>
                <p:commandButton value="Search" icon="pi pi-search" actionListener="#{productBean.search}" update=":productGridForm"/>
            </h:form>

            <h:form id="loginLinkForm" class="login-btn">
                <p:button value="Login" icon="pi pi-sign-in" outcome="login"/>
            </h:form>
        </div>

        <div class="content">
            <h:form id="productGridForm">
                <h3 style="color:#444;">Products for sale</h3>

                <h:panelGroup rendered="#{empty productBean.allProducts}">
                    <p class="empty-msg">No products found.</p>
                </h:panelGroup>

                <div class="product-grid">
                    <ui:repeat value="#{productBean.allProducts}" var="p">
                        <h:panelGroup layout="block" class="product-card">
                            <h:link outcome="product-detail" style="text-decoration:none; color:inherit;">
                                <f:param name="id" value="#{p.id}"/>
                                <h:panelGroup rendered="#{not empty p.imageBase64}">
                                    <img src="data:image/jpeg;base64,#{p.imageBase64}" alt="#{p.name}"/>
                                </h:panelGroup>
                                <h:panelGroup layout="block" class="no-image-box" rendered="#{empty p.imageBase64}">
                                    No image
                                </h:panelGroup>
                                <div class="product-name">#{p.name}</div>
                                <div class="product-price">
                                    <h:outputText value="#{p.price}">
                                        <f:convertNumber type="currency" currencySymbol="Rs "/>
                                    </h:outputText>
                                </div>
                            </h:link>
                        </h:panelGroup>
                    </ui:repeat>
                </div>
            </h:form>
        </div>
    </h:body>
</html>
