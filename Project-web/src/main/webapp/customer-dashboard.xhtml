<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Customer Dashboard</title>
        <style>
            .top-bar { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:#2c3e50; color:#fff; }
            .content { max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: Arial, sans-serif; }
        </style>
    </h:head>

    <h:body>
        <div class="top-bar">
            <h2>Customer Dashboard</h2>
            <h:form>
                <p:commandButton value="Logout" action="#{userBean.logout}" ajax="false"
                                  icon="pi pi-sign-out" styleClass="ui-button-danger"/>
            </h:form>
        </div>
        <div class="content">
            <p>Welcome, <strong>#{sessionScope.currentUser.username}</strong>.</p>
            <p>Browse products and place orders here soon.</p>
        </div>
    </h:body>
</html>
