<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    
    <h:head>
        <title> Contact form </title>
    </h:head>
    
    <h:body>
        <h:form id = "form">
        
            <p:panel header =" Contact Form">

                <p:panelGrid columns = "4">
                    <p:outputLabel value="First name"/>
                    <p:inputText value="#{contactBean.contact.FName}" required="true" requiredMessage="First name is required"/>

                    <p:outputLabel value=" Last name"/>
                    <p:inputText value="#{contactBean.contact.LName}" required="true" requiredMessage="Last name is required"/>
                    
                </p:panelGrid>
                <p:panelGrid columns = "2">


                    <p:outputLabel value =" Email"/>
                    <p:inputText value="#{contactBean.contact.email}" required="true" requiredMessage="Email is required"/>

                    <p:outputLabel value="Address"/>
                    <p:inputText value="#{contactBean.contact.address}" required="true" requiredMessage="Address is required" />

                    <p:outputLabel value="Number"/>
                    <p:inputText value="#{contactBean.contact.number}" maxlength="10" required="true" requiredMessage="Number is required" />

                </p:panelGrid>
                
                <br/>
                
                <p:commandButton value="Save" action="#{contactBean.save()}" update="@form"/>

            </p:panel>

            <p:dataTable id ="table" value="#{contactBean.contactList}" var = "c" >
                
                <p:column headerText="First name">
                    <h:outputText value="#{c.FName}"/>                 
                </p:column>
                
                <p:column headerText="Last name">
                    <h:outputText value="#{c.LName}"/>                    
                </p:column>
                
                <p:column headerText="Email">
                    <h:outputText value="#{c.email}"/>          
                </p:column>
                
                <p:column headerText="Address">
                    <h:outputText value="#{c.address}"  />                  
                </p:column>
                
                <p:column headerText="Number">
                    <h:outputText value="#{c.number}"/>                    
                </p:column>
                
            </p:dataTable>
        
        </h:form>
                    
    </h:body>
    
</html>
