<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
          
    <h:head>
        <title>Login</title>
        <title>Account Login</title>
        <style>
            .container { display: flex; justify-content: center; align-items: center; height: 80vh; }
        </style>
    </h:head>
        
        <h:body>
            
            <div class="login">
                
                <h:form id ="loginForm">
                    <p:growl id="messages" showDetail="true" />
                
                <p:panel header="Sign In" style="width: 380px;">
                    <h:panelGrid columns="2" cellpadding="7">
                        
                        <p:outputLabel for="username" value="Username:"/>
                        <p:inputText id="username" value="#{userBean.loginUsername}" required ="true"/>
                        
                        <p:outputLabel for="password" value="Password:"/>
                        <p:password id="password" value="#{userBean.loginPassword}" required ="true"/>
                        
                        
                    </h:panelGrid>
                    
                    <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                        <p:commandButton value="Login" action="#{userBean.login}" ajax="false" icon="pi pi-sign-in" />
                        <p:link outcome="register" value="Create an account" />
                    </div>
                    
                </p:panel>                
                </h:form>
            </div>
        </h:body>
</html>
